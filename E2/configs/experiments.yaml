# Master experiment registry — must-haves (E0–E6) per FINAL_experimental_plan_v7.md.
#
# Schema (per entry):
#   exp_id:          short label from the v7 plan (e.g. "E1.3")
#   method:          zero_shot | sft | cl_embed | cl_llm | cl_ce | dino_ce | dino_ce_attn | dino_cl | dino_cl_attn | dino_clip
#   task:            binary | 7class | 8class
#   dataset_train:   HF repo id of the training split (omit for ZS)
#   dataset_eval:    HF repo id of the eval split
#   seeds:           list[int] — one run per seed (expanded by run_experiment.py)
#   data_fraction:   float in (0,1] — for E2 (uses splits in data/low_data_splits.json)
#   epochs:          int
#   batch_size:      int
#   grad_accum:      int (default 1)
#   lr:              float
#   gc_batch_size:   int — CL-Embed only; effective contrastive batch via GradCache
#   variant:         frozen | lora — DINOv2 methods only
#   lr_proj / lr_encoder: per-group LRs for DINOv2 contrastive variants
#
# 2026-05 final restructure (current line-up — 7 trainable + 1 zero-shot):
#   - SFT, CL-Embed (full VLM + last-token InfoNCE), CL-LLM (yes/no for
#     binary, letter-token logits for 7class/8class), CL+CE.
#   - DINOv2-CE / DINOv2-CL / DINOv2-CLIP — pure-vision and vision-text
#     baselines on facebook/dinov2-large + sentence-transformers MiniLM.
#   - CL-FULL, CLIP-CL, and CL-FT retired as documented negative results;
#     v6 numbers for CL-FT are kept at results/E1_cl_ft_*_seed42.

# ============================================================================
# E0 — Zero-Shot Baseline (no training)
# ============================================================================
E0_ZS_8class_rlbench_test:
  exp_id: E0
  method: zero_shot
  task: 8class
  dataset_eval: paulpacaud/rlbenchfail_test_dataset

E0_ZS_8class_ur5_test:
  exp_id: E0
  method: zero_shot
  task: 8class
  dataset_eval: paulpacaud/ur5fail_test_dataset

# ============================================================================
# E1 — In-Distribution Classification on RLBench-Fail
# ============================================================================
# E1.1 — binary (success vs failure)
