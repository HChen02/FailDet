E1.1_CL_Embed_binary:      { exp_id: E1.1, method: cl_embed,  task: binary, dataset_train: paulpacaud/rlbenchfail_train_dataset, dataset_eval: paulpacaud/rlbenchfail_test_dataset, seeds: [42, 123, 456], epochs: 2,  batch_size: 4,  grad_accum: 4, lr: 2.0e-4, gc_batch_size: 512 }
